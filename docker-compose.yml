version: '3.9'

services:
  booking-ui-admin:
    container_name: booking-ui-admin
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      my_custom_network:
        ipv4_address: ${APP_IP}

networks:
  my_custom_network:
    external: true
